faq:
  title: Frequently Asked Questions
  description: Answers to common questions about my process and services.
  categories:
    - title: Services & Process
      questions:
        - label: What services do you offer?
          content: |
            I specialize in full-stack web development and machine learning engineering. This includes backend API development with FastAPI, frontend applications with Nuxt 4 and Vue.js, database design with PostgreSQL, ML model development with PyTorch, and deployment with Docker. I build scalable, production-ready systems from concept to deployment.
        - label: What is your development process like?
          content: |
            My process is collaborative and iterative, involving requirements analysis, architecture design, implementation, testing, and deployment. I use modern development practices including version control, CI/CD pipelines, and containerization. I tailor the approach based on project needs, always focusing on scalable and maintainable solutions.
        - label: Do you work with startups?
          content: |
            Absolutely! I enjoy working with startups and small teams to build MVPs, scale applications, and implement AI/ML features. I can adapt to fast-paced environments and help establish solid technical foundations.
    - title: Pricing & Timelines
      questions:
        - label: How much does a project typically cost?
          content: |
            Project costs vary based on scope, complexity, and timeline. For full-stack web applications, costs typically range from $3,000 to $15,000 depending on features and complexity. ML/AI projects start at $5,000 and can scale based on model complexity and data requirements. Consulting rates are $50-80/hour.
        - label: What are your payment terms?
          content: |
            I generally require a 50% deposit to begin work, with the remaining 50% due upon project completion. For larger projects, I offer milestone-based payments. I accept payments via bank transfer, M-Pesa, and international payment methods.
        - label: How long does a typical project take?
          content: |
            Timelines depend on project scope. Simple web applications take 2-4 weeks, complex full-stack projects 1-3 months, and ML projects 2-6 months depending on data availability and model complexity. I provide detailed estimates after initial consultation.
        - label: Do you offer retainers or ongoing support?
          content: |
            Yes, I offer monthly retainer options for ongoing development, maintenance, and ML model updates. This is ideal for clients needing continuous development support or regular AI model improvements.
    - title: About Me
      questions:
        - label: What do you enjoy most about your work?
          content: |
            I love building systems that solve real problems using cutting-edge technology. Whether it's creating efficient APIs, training ML models, or architecting scalable applications, the challenge of turning complex requirements into working solutions is what drives me.
        - label: What are your hobbies outside of work?
          content: |
            When I'm not coding or training models, I enjoy exploring new technologies, contributing to open-source projects, and learning about distributed systems. I also like cycling and mentoring junior developers.
